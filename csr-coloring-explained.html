<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1117; color: #c9d1d9; }

}

  display: flex; justify-content: center; gap: 8px; padding: 10px;
  background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap;
}

  padding: 6px 16px; border: 1px solid #30363d; border-radius: 6px;
  background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.85em;
}

.phase-bar {
  display: flex; justify-content: center; gap: 6px; padding: 6px;
  background: #0d1117; flex-wrap: wrap;
}

  padding: 3px 10px; border-radius: 10px; font-size: 0.75em;

}

.main {
  display: grid; grid-template-columns: 280px 1fr;
  height: calc(100vh - 120px); overflow: hidden;
}

.left { background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; }

}

/* Array cells */

}

  width: 36px; text-align: center; font-size: 0.6em; flex-shrink: 0;
}

/* Color list viz */
.color-lists {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.cl-card {
  background: #21262d; border: 1px solid #30363d; border-radius: 6px;
  padding: 6px 8px; min-width: 70px; transition: all 0.3s;
}

  width: 22px; height: 18px; border-radius: 3px; display: flex;

}

}

/* Buckets */

}

.bucket .b-item {
  width: 24px; height: 20px; border-radius: 3px; display: flex;
  align-items: center; justify-content: center; font-size: 0.75em;

/* Pseudocode */
.pseudo {

}

.pseudo .kw { color: #ff7b72; }

.pseudo .cm { color: #8b949e; }

/* Graph SVG */
.graph-svg { width: 100%; }
.g-edge { stroke: #30363d; stroke-width: 2; }
.g-edge.active { stroke: #f0883e; stroke-width: 2.5; }
.g-node { stroke-width: 2; }
.g-label { fill: #fff; font-size: 13px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }

/* Log */
.log-box {
  background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
  padding: 8px; max-height: 130px; overflow-y: auto; margin-top: 10px;
}
.log-box h4 { font-size: 0.8em; color: #f0883e; margin-bottom: 4px; }
.log-entry {
  font-size: 0.75em; font-family: Consolas, monospace; padding: 2px 0;
  border-bottom: 1px solid #21262d; line-height: 1.5;
}
</style>

<body>

<div class="header">
  <h1>Greedy List-Coloring on CSR (Algorithm 2) — Step by Step</h1>
  <p>How confColorGreedyCSR() uses CSR offsets[] + neighbors[] to color the conflict graph</p>
</div>

<div class="controls">
  <button onclick="reset()">⟲ Reset</button>
  <button onclick="prevStep()">← Back</button>
  <button class="primary" onclick="nextStep()">Next Step →</button>
  <button onclick="autoPlay()">▶ Auto</button>
  <span class="step-info">Step <span id="stepNum">0</span>/<span id="totalSteps">0</span></span>
</div>

<div class="phase-bar">
  <span class="phase-tag active" id="ph0">Input</span>
  <span class="phase-tag" id="ph1">Init Buckets</span>
  <span class="phase-tag" id="ph2">Pick & Color</span>
  <span class="phase-tag" id="ph3">Update Neighbors</span>
  <span class="phase-tag" id="ph4">Done</span>
</div>

<div class="main">
  <div class="left">
    <h2>Conflict Graph</h2>
    <svg id="graphSvg" class="graph-svg" viewBox="0 0 260 300"></svg>
    <div id="pseudoArea" style="padding:8px;"></div>
  </div>
  <div class="right" id="dataArea"></div>
</div>

<script>
// =========================================================
// EXAMPLE: 6-vertex conflict graph with color lists
// =========================================================
const N = 6;
// Conflict edges (undirected)
const EDGES = [[0,1],[0,2],[1,2],[1,3],[2,4],[3,5],[4,5]];
// Color lists for each vertex (sampled from palette)
const INIT_LISTS = {
  0: [0, 2],
  1: [0, 1, 2],
  2: [1, 2],
  3: [0, 1],
  4: [0, 2],
  5: [1, 2]
};
// Named colors for display
const COLOR_NAMES = ['Red','Blue','Green','Yellow','Purple'];
const COLOR_HEX = ['#f47067','#58a6ff','#7ee787','#e3b341','#d2a8ff'];
const VCOLORS = ['#f47067','#dcbdfb','#7ee787','#79c0ff','#f0883e','#a5d6ff'];

// Build CSR from edges
function buildCSR() {
  let deg = new Array(N).fill(0);
  EDGES.forEach(([u,v]) => { deg[u]++; deg[v]++; });
  let offsets = [0];
  for (let i = 0; i < N; i++) offsets.push(offsets[i] + deg[i]);
  let neighbors = new Array(offsets[N]).fill(0);
  let cnt = new Array(N).fill(0);
  EDGES.forEach(([u,v]) => {
    neighbors[offsets[u] + cnt[u]++] = v;
    neighbors[offsets[v] + cnt[v]++] = u;
  });
  return { offsets, neighbors };
}

const CSR = buildCSR();

// Graph layout
const POS = {
  0: {x:130,y:35},
  1: {x:50,y:120},
  2: {x:210,y:120},
  3: {x:50,y:220},
  4: {x:210,y:220},
  5: {x:130,y:280}
};

// =========================================================
// Simulation state
// =========================================================
let steps = [];
let currentStep = -1;
let autoTimer = null;

function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

function buildSteps() {
  steps = [];

  // ------ Phase 0: Show Input ------
  steps.push({
    phase: 0, pseudoHL: [],
    narration: `<strong>Input: CSR conflict graph + color lists</strong><br><br>
We have a conflict graph with <code>${N}</code> vertices and <code>${EDGES.length}</code> edges stored in <strong>CSR format</strong>:<br>
• <code>offsets = [${CSR.offsets.join(', ')}]</code><br>
• <code>neighbors = [${CSR.neighbors.join(', ')}]</code><br><br>
Each vertex has a <strong>color list</strong> (sampled from the palette). The algorithm must assign each vertex a color from its list such that <em>no two conflict-neighbors share the same color</em>.`,
    activeEdges: [], activeVerts: [], pickedVtx: -1,
    lists: deepCopy(INIT_LISTS), removed: {}, assigned: {},
    buckets: null, activeBucket: -1, csrHL: [],
    log: ['CSR conflict graph with 6 vertices, 7 edges']
  });

  // Simulation
  let lists = {};
  for (let v = 0; v < N; v++) lists[v] = [...INIT_LISTS[v]];
  let removed = {}; // v -> set of removed colors
  for (let v = 0; v < N; v++) removed[v] = new Set();
  let assigned = {};
  let buckets = {}; // listSize -> [vertices]
  let processed = new Set();
  let invalid = new Set();

  // ------ Phase 1: Init Buckets ------
  // First, color isolated vertices (degree 0 in conflict graph)
  // In our example, all have edges, so we just bucket them

  // Check for isolated
  let initLog = [];
  for (let v = 0; v < N; v++) {
    let deg = CSR.offsets[v+1] - CSR.offsets[v];
    if (deg === 0) {
      assigned[v] = lists[v][0];
      processed.add(v);
      initLog.push(`v${v} has no conflict neighbors → color = ${COLOR_NAMES[lists[v][0]]}`);
    }
  }

  // Build buckets
  for (let v = 0; v < N; v++) {
    if (processed.has(v)) continue;
    let sz = lists[v].length;
    if (!buckets[sz]) buckets[sz] = [];
    buckets[sz].push(v);
  }

  steps.push({
    phase: 1, pseudoHL: [1,2,3,4,5,6],
    narration: `<strong>Initialize Buckets</strong><br><br>
Place each vertex into a bucket based on its <strong>color list size</strong>. Vertices with smaller lists have fewer options, so we color them first.<br><br>
${Object.keys(buckets).sort((a,b)=>a-b).map(sz =>
  `Bucket[${sz}]: {${buckets[sz].map(v=>'v'+v).join(', ')}} — ${sz} color${sz>1?'s':''} available`
).join('<br>')}<br><br>
Now we start picking from the <strong>smallest bucket</strong>.`,
    activeEdges: [], activeVerts: [], pickedVtx: -1,
    lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
    buckets: deepCopy(buckets), activeBucket: -1, csrHL: [],
    log: [...initLog, 'Buckets initialized']
  });

  // ------ Phase 2 & 3: Main loop ------
  let round = 0;
  while (true) {
    // Find smallest non-empty bucket
    let minSz = -1;
    for (let sz = 0; sz <= 10; sz++) {
      if (buckets[sz] && buckets[sz].length > 0) { minSz = sz; break; }
    }
    if (minSz === -1) break;
    if (minSz === 0) {
      // All remaining vertices in bucket 0 are invalid
      buckets[0].forEach(v => {
        invalid.add(v);
        processed.add(v);
        assigned[v] = -2;
      });
      buckets[0] = [];
      continue;
    }

    // Pick first vertex from smallest bucket (paper says "random", we pick first for determinism)
    let v = buckets[minSz][0];
    buckets[minSz] = buckets[minSz].filter(x => x !== v);

    // Show pick step
    steps.push({
      phase: 2, pseudoHL: [8,9,10,11],
      narration: `<strong>Round ${round+1}: Pick vertex from smallest bucket</strong><br><br>
Smallest non-empty bucket is <strong>Bucket[${minSz}]</strong> (vertices with ${minSz} color${minSz>1?'s':''}).<br>
Pick <strong>v${v}</strong> from Bucket[${minSz}].<br><br>
Now try to color v${v}. Its available colors: [${lists[v].filter(c => !removed[v].has(c)).map(c => COLOR_NAMES[c]).join(', ')}]<br>
Check each color against v${v}'s <strong>conflict neighbors</strong> using CSR:<br>
<code>neighbors[offsets[${v}]..offsets[${v+1}]-1]</code> = <code>neighbors[${CSR.offsets[v]}..${CSR.offsets[v+1]-1}]</code> = [${getCSRNeighbors(v).join(', ')}]`,
      activeEdges: getEdgeIndices(v), activeVerts: [v], pickedVtx: v,
      lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
      buckets: deepCopy(buckets), activeBucket: minSz,
      csrHL: range(CSR.offsets[v], CSR.offsets[v+1]),
      log: [`Pick v${v} from Bucket[${minSz}]`]
    });

    // Try to color v
    let availColors = lists[v].filter(c => !removed[v].has(c));
    let chosenColor = -1;
    let triedColors = [];

    for (let c of availColors) {
      let conflict = false;
      let conflictWith = -1;
      let nbrs = getCSRNeighbors(v);
      for (let u of nbrs) {
        if (assigned[u] === c) {
          conflict = true;
          conflictWith = u;
          break;
        }
      }
      triedColors.push({color: c, conflict, conflictWith});
      if (!conflict) {
        chosenColor = c;
        break;
      }
    }

    if (chosenColor >= 0) {
      assigned[v] = chosenColor;
      processed.add(v);

      // Build detailed neighbor status for the narration
      let nbrStatus = getCSRNeighbors(v).map(u => {
        let status = assigned[u] >= 0 ? `colored ${COLOR_NAMES[assigned[u]]}` : (assigned[u] === -2 ? 'INVALID' : 'uncolored');
        return `v${u} (${status})`;
      }).join(', ');

      let tryDesc = triedColors.map(t => {
        if (t.conflict) {
          return `<span class="red">✗ ${COLOR_NAMES[t.color]}</span> — neighbor v${t.conflictWith} is already <strong>colored</strong> ${COLOR_NAMES[t.color]} → conflict!`;
        } else {
          // Show WHY it passed: list which neighbors were checked and their current assigned color
          let nbrChecks = getCSRNeighbors(v).map(u => {
            let asg = assigned[u];
            if (asg >= 0 && asg !== t.color) return `v${u}=${COLOR_NAMES[asg]}≠${COLOR_NAMES[t.color]}`;
            if (asg === undefined || asg === -1) return `v${u}=uncolored`;
            if (asg === -2) return `v${u}=invalid`;
            return `v${u}=?`;
          }).join(', ');
          return `<span class="green">✓ ${COLOR_NAMES[t.color]}</span> — no neighbor is <strong>currently colored</strong> ${COLOR_NAMES[t.color]} (checked: ${nbrChecks})`;
        }
      }).join('<br>');

      steps.push({
        phase: 2, pseudoHL: [12,13,14,15,16],
        narration: `<strong>Color v${v} = ${COLOR_NAMES[chosenColor]}</strong><br><br>
v${v}'s conflict neighbors (from CSR): [${nbrStatus}]<br><br>
For each color in v${v}'s list, check if any neighbor is <em>already colored</em> with it:<br>
${tryDesc}<br><br>
<em>Note: we only check <strong>assigned</strong> colors, not what's in neighbors' lists. A neighbor having ${COLOR_NAMES[chosenColor]} in its list doesn't matter — only if it's already been <strong>colored</strong> ${COLOR_NAMES[chosenColor]}.</em><br><br>
Assign <strong>v${v} ← ${COLOR_NAMES[chosenColor]}</strong>. Now update neighbors' color lists.`,
        activeEdges: getEdgeIndices(v), activeVerts: [v], pickedVtx: v,
        lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
        buckets: deepCopy(buckets), activeBucket: -1,
        csrHL: range(CSR.offsets[v], CSR.offsets[v+1]),
        log: [`v${v} colored ${COLOR_NAMES[chosenColor]}`]
      });

      // fixBucketsCSR: update neighbors
      let nbrs = getCSRNeighbors(v);
      let affectedNbrs = [];

      for (let u of nbrs) {
        if (processed.has(u)) continue;
        let uAvail = lists[u].filter(c => !removed[u].has(c));
        if (uAvail.includes(chosenColor)) {
          // Remove chosenColor from u's list
          let oldSz = uAvail.length;
          removed[u].add(chosenColor);
          let newSz = oldSz - 1;

          // Move u between buckets
          if (buckets[oldSz]) buckets[oldSz] = buckets[oldSz].filter(x => x !== u);
          if (newSz === 0) {
            invalid.add(u);
            processed.add(u);
            assigned[u] = -2;
            affectedNbrs.push({u, oldSz, newSz, result: 'invalid'});
          } else {
            if (!buckets[newSz]) buckets[newSz] = [];
            buckets[newSz].push(u);
            affectedNbrs.push({u, oldSz, newSz, result: 'moved'});
          }
        }
      }

      if (affectedNbrs.length > 0) {
        let updateDesc = affectedNbrs.map(a => {
          if (a.result === 'invalid')
            return `<span class="red">v${a.u}: removed ${COLOR_NAMES[chosenColor]} → list empty → INVALID</span>`;
          return `v${a.u}: removed ${COLOR_NAMES[chosenColor]}, Bucket[${a.oldSz}] → Bucket[${a.newSz}]`;
        }).join('<br>');

        steps.push({
          phase: 3, pseudoHL: [17,18,19,20,21,22],
          narration: `<strong>fixBucketsCSR(v${v}, ${COLOR_NAMES[chosenColor]})</strong><br><br>
Scan v${v}'s CSR neighbors: <code>neighbors[${CSR.offsets[v]}..${CSR.offsets[v+1]-1}]</code> = [${nbrs.join(', ')}]<br><br>
For each uncolored neighbor that has <strong>${COLOR_NAMES[chosenColor]}</strong> in its list:<br>
${updateDesc}<br><br>
<em>This is the key CSR read: we loop from <code>offsets[${v}]</code> to <code>offsets[${v+1}]-1</code>, reading each neighbor index from the <code>neighbors[]</code> array.</em>`,
          activeEdges: getEdgeIndices(v),
          activeVerts: [v, ...affectedNbrs.map(a=>a.u)], pickedVtx: -1,
          lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
          buckets: deepCopy(buckets), activeBucket: -1,
          csrHL: range(CSR.offsets[v], CSR.offsets[v+1]),
          log: affectedNbrs.map(a => `v${a.u}: ${COLOR_NAMES[chosenColor]} removed, bucket ${a.oldSz}→${a.newSz}`)
        });
      } else {
        steps.push({
          phase: 3, pseudoHL: [17,18,19],
          narration: `<strong>fixBucketsCSR(v${v}, ${COLOR_NAMES[chosenColor]})</strong><br><br>
Scan v${v}'s CSR neighbors: [${nbrs.join(', ')}]<br>
None of the uncolored neighbors have <strong>${COLOR_NAMES[chosenColor]}</strong> in their list. No bucket changes needed.`,
          activeEdges: getEdgeIndices(v), activeVerts: [v], pickedVtx: -1,
          lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
          buckets: deepCopy(buckets), activeBucket: -1,
          csrHL: range(CSR.offsets[v], CSR.offsets[v+1]),
          log: [`No neighbor lists affected`]
        });
      }

    } else {
      // Can't color — all colors conflict
      assigned[v] = -2;
      invalid.add(v);
      processed.add(v);

      steps.push({
        phase: 2, pseudoHL: [23,24],
        narration: `<strong>v${v} CANNOT be colored!</strong><br><br>
All colors in v${v}'s list conflict with already-colored neighbors.<br>
Mark v${v} as <span class="red">INVALID</span> (color = -2). It will be handled in the next Picasso iteration.`,
        activeEdges: getEdgeIndices(v), activeVerts: [v], pickedVtx: v,
        lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
        buckets: deepCopy(buckets), activeBucket: -1,
        csrHL: range(CSR.offsets[v], CSR.offsets[v+1]),
        log: [`v${v} marked INVALID`]
      });
    }

    round++;
    if (round > 20) break; // Safety
  }

  // ------ Phase 4: Done ------
  let nColored = Object.values(assigned).filter(c => c >= 0).length;
  let nInvalid = Object.values(assigned).filter(c => c === -2).length;
  let colorSummary = Object.entries(assigned)
    .filter(([v,c]) => c >= 0)
    .map(([v,c]) => `v${v} = ${COLOR_NAMES[c]}`)
    .join(', ');

  steps.push({
    phase: 4, pseudoHL: [],
    narration: `<strong>Coloring Complete! 🎉</strong><br><br>
<strong>${nColored}</strong> vertices colored, <strong>${nInvalid}</strong> invalid.<br><br>
<strong>Result:</strong> ${colorSummary}<br>
${nInvalid > 0 ? `<br><span class="yellow">Invalid vertices will get fresh palettes in the next Picasso iteration.</span>` : '<br><span class="green">All vertices successfully colored!</span>'}<br><br>
<strong>Key insight:</strong> The CSR arrays were used in two places:<br>
1. <strong>attemptToColor</strong>: scan <code>neighbors[offsets[v]..offsets[v+1]-1]</code> to check if any neighbor already has the candidate color<br>
2. <strong>fixBucketsCSR</strong>: scan the same range to remove the chosen color from neighbors' lists and update buckets`,
    activeEdges: [], activeVerts: [], pickedVtx: -1,
    lists: deepCopy(lists), removed: deepCopyRemoved(removed), assigned: {...assigned},
    buckets: deepCopy(buckets), activeBucket: -1, csrHL: [],
    log: [`Done: ${nColored} colored, ${nInvalid} invalid`]
  });

  document.getElementById('totalSteps').textContent = steps.length - 1;
}

// Helpers
function getCSRNeighbors(v) {
  let nbrs = [];
  for (let i = CSR.offsets[v]; i < CSR.offsets[v+1]; i++) nbrs.push(CSR.neighbors[i]);
  return nbrs;
}
function getEdgeIndices(v) {
  let res = [];
  EDGES.forEach(([u,w], i) => { if (u === v || w === v) res.push(i); });
  return res;
}
function range(a, b) { let r = []; for (let i = a; i < b; i++) r.push(i); return r; }
function deepCopyRemoved(rem) {
  let r = {};
  for (let v in rem) r[v] = new Set(rem[v]);
  return r;
}

// =========================================================
// Rendering
// =========================================================
function drawGraph(step) {
  const svg = document.getElementById('graphSvg');
  let html = '';

  // Edges
  EDGES.forEach(([u,v], i) => {
    let cls = 'g-edge';
    if (step.activeEdges.includes(i)) cls += ' active';
    html += `<line class="${cls}" x1="${POS[u].x}" y1="${POS[u].y}" x2="${POS[v].x}" y2="${POS[v].y}"/>`;
  });

  // Nodes
  for (let v = 0; v < N; v++) {
    let fill = '#21262d';
    let stroke = VCOLORS[v];
    let sw = 2;
    if (step.assigned[v] >= 0) {
      fill = COLOR_HEX[step.assigned[v]];
      stroke = '#fff';
    } else if (step.assigned[v] === -2) {
      fill = '#21262d'; stroke = '#f47067'; sw = 2;
    }
    if (step.activeVerts.includes(v)) sw = 3;
    if (v === step.pickedVtx) { stroke = '#f0883e'; sw = 3; }
    html += `<circle class="g-node" cx="${POS[v].x}" cy="${POS[v].y}" r="20" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    html += `<text class="g-label" x="${POS[v].x}" y="${POS[v].y}">${v}</text>`;
  }

  svg.innerHTML = html;
}

function renderPseudo(hlLines) {
  const lines = [
    ['','<span class="kw">function</span> <span class="fn">confColorGreedyCSR</span>():'],
    ['1',' <span class="kw">for</span> each vertex v:'],
    ['2','   <span class="kw">if</span> offsets[v+1]-offsets[v] == 0:'],
    ['3','     color v with random from list <span class="cm">// no conflicts</span>'],
    ['4','   <span class="kw">else</span>:'],
    ['5','     bucket[list_size(v)].add(v)'],
    ['6','   track vMin = smallest bucket'],
    ['',''],
    ['8',' <span class="kw">while</span> vertices remain:'],
    ['9','   find smallest non-empty bucket'],
    ['10','   pick vertex v from it'],
    ['11','   <span class="cm">// --- attempt to color ---</span>'],
    ['12','   <span class="kw">for</span> each color c in v\'s list:'],
    ['13','     <span class="kw">for</span> id = offsets[v]..offsets[v+1]-1:'],
    ['14','       u = neighbors[id]'],
    ['15','       <span class="kw">if</span> colors[u] == c: skip c'],
    ['16','     colors[v] = c <span class="cm">// success!</span>'],
    ['17','   <span class="cm">// --- fixBucketsCSR ---</span>'],
    ['18','   <span class="kw">for</span> id = offsets[v]..offsets[v+1]-1:'],
    ['19','     u = neighbors[id]'],
    ['20','     <span class="kw">if</span> c in u\'s list:'],
    ['21','       remove c from u\'s list'],
    ['22','       move u to smaller bucket'],
    ['23','   <span class="kw">if</span> no color works:'],
    ['24','     mark v INVALID']
  ];
  let html = '<div class="pseudo">';
  lines.forEach(([num, text]) => {
    let cls = 'line';
    if (num && hlLines.includes(parseInt(num))) cls += ' hl';
    html += `<div class="${cls}">${text}</div>`;
  });
  html += '</div>';
  document.getElementById('pseudoArea').innerHTML = html;
}

function renderStep(step) {
  drawGraph(step);
  renderPseudo(step.pseudoHL || []);

  const area = document.getElementById('dataArea');
  let html = '';

  // Narration
  html += `<div class="narration">${step.narration}</div>`;

  // CSR arrays
  html += `<div class="section"><h3>📊 CSR Arrays</h3>`;
  html += `<div class="desc">offsets[v] to offsets[v+1] gives the range in neighbors[] for vertex v</div>`;

  // Offsets
  html += `<div class="arr-row"><span class="arr-label">offsets[]</span>`;
  CSR.offsets.forEach((val, i) => {
    html += `<div class="arr-cell"><span class="idx">${i}</span>${val}</div>`;
  });
  html += `</div>`;
  html += `<div class="arr-row"><span class="arr-label"></span>`;
  for (let i = 0; i <= N; i++) {
    html += `<div style="width:36px;text-align:center;font-size:0.55em;color:#484f58;flex-shrink:0;">${i<N?'v'+i:'end'}</div>`;
  }
  html += `</div>`;

  // Neighbors with highlighting
  html += `<div class="arr-row"><span class="arr-label">neighbors[]</span>`;
  CSR.neighbors.forEach((val, i) => {
    let cls = 'arr-cell';
    if (step.csrHL && step.csrHL.includes(i)) cls += ' hl';
    html += `<div class="${cls}"><span class="idx">${i}</span>${val}</div>`;
  });
  html += `</div>`;

  // Owner labels
  html += `<div class="arr-row"><span class="arr-label"></span>`;
  CSR.neighbors.forEach((val, i) => {
    let owner = -1;
    for (let v = 0; v < N; v++) {
      if (i >= CSR.offsets[v] && i < CSR.offsets[v+1]) { owner = v; break; }
    }
    html += `<div style="width:36px;text-align:center;font-size:0.55em;color:${VCOLORS[owner]};flex-shrink:0;">v${owner}</div>`;
  });
  html += `</div></div>`;

  // Color lists
  html += `<div class="section"><h3>🎨 Color Lists</h3>`;
  html += `<div class="color-lists">`;
  for (let v = 0; v < N; v++) {
    let cls = 'cl-card';
    if (step.pickedVtx === v) cls += ' active';
    if (step.assigned[v] >= 0) cls += ' colored';
    if (step.assigned[v] === -2) cls += ' invalid';

    html += `<div class="${cls}">`;
    html += `<div class="vtx-name" style="color:${VCOLORS[v]}">v${v}</div>`;
    html += `<div class="colors-row">`;
    INIT_LISTS[v].forEach(c => {
      let chipCls = 'color-chip';
      if (step.removed[v] && step.removed[v].has(c)) chipCls += ' removed';
      if (step.assigned[v] === c) chipCls += ' chosen';
      html += `<div class="${chipCls}" style="background:${COLOR_HEX[c]}40;color:${COLOR_HEX[c]}">${COLOR_NAMES[c][0]}</div>`;
    });
    html += `</div>`;
    if (step.assigned[v] >= 0) {
      html += `<div class="assigned">= ${COLOR_NAMES[step.assigned[v]]}</div>`;
    } else if (step.assigned[v] === -2) {
      html += `<div style="font-size:0.7em;margin-top:3px;color:#f47067;">INVALID</div>`;
    }
    html += `</div>`;
  }
  html += `</div></div>`;

  // Buckets
  if (step.buckets) {
    html += `<div class="section"><h3>🪣 Buckets (grouped by list size)</h3>`;
    html += `<div class="desc">Always pick from the smallest non-empty bucket first</div>`;
    html += `<div class="buckets-area">`;
    let allSizes = new Set([1,2,3]);
    Object.keys(step.buckets).forEach(s => allSizes.add(parseInt(s)));
    [...allSizes].sort((a,b)=>a-b).forEach(sz => {
      let items = step.buckets[sz] || [];
      let cls = 'bucket';
      if (step.activeBucket === sz) cls += ' active';
      html += `<div class="${cls}">`;
      html += `<div class="b-title">size=${sz}</div>`;
      html += `<div class="b-items">`;
      if (items.length === 0) {
        html += `<span style="font-size:0.65em;color:#484f58;">empty</span>`;
      }
      items.forEach(v => {
        let icls = 'b-item';
        if (v === step.pickedVtx) icls += ' picked';
        html += `<div class="${icls}" style="background:${VCOLORS[v]}33;color:${VCOLORS[v]}">v${v}</div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  // Log
  if (step.log && step.log.length > 0) {
    html += `<div class="log-box"><h4>📝 Log</h4>`;
    step.log.forEach(l => {
      html += `<div class="log-entry">${l}</div>`;
    });
    html += `</div>`;
  }

  area.innerHTML = html;

  // Phase tags
  for (let i = 0; i <= 4; i++) {
    document.getElementById('ph'+i).className = 'phase-tag' + (i === step.phase ? ' active' : '');
  }
  document.getElementById('stepNum').textContent = currentStep;
}

// =========================================================
// Controls
// =========================================================
function nextStep() {
  if (currentStep < steps.length - 1) { currentStep++; renderStep(steps[currentStep]); }
}
function prevStep() {
  if (currentStep > 0) { currentStep--; renderStep(steps[currentStep]); }
}
function reset() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  currentStep = 0; renderStep(steps[0]);
}
function autoPlay() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; return; }
  autoTimer = setInterval(() => {
    if (currentStep >= steps.length - 1) { clearInterval(autoTimer); autoTimer = null; }
    else nextStep();
  }, 2500);
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
  if (e.key === 'r') reset();
});

// =========================================================
// Init
// =========================================================
buildSteps();
currentStep = 0;
renderStep(steps[0]);
</script>
</body>
</html>
